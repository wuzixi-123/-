<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="📝 今天做了什么 - 个人专属日程记录应用，每个用户数据完全隔离">
    <meta name="keywords" content="日程,任务,记录,待办,计划,个人">
    <meta name="author" content="Daily Task Recorder">
    <title>📝 今天做了什么 - 个人日程记录应用</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<div class="chat-widget">
    <div class="chat-header" onclick="document.getElementById('chatBody').classList.toggle('active')">
        💬 联系站长
    </div>
    <div class="chat-body" id="chatBody">
        <div class="chat-messages" id="chatMessages"></div>
        <div class="chat-input-area">
            <input type="text" id="chatInput" placeholder="写点什么...">
            <button onclick="sendChatMessage()">发送</button>
        </div>
    </div>
</div>
<body>
    <div class="container">
        <header class="header">
            <div class="header-top">
                <h1 class="title">📝 今天做了什么</h1>
                <div class="user-section">
                    <span class="user-display" id="userDisplay">用户: 我</span>
                    <button class="switch-user-btn" id="switchUserBtn" title="修改用户名">👤</button>
                </div>
            </div>
            <p class="date" id="currentDate"></p>
        </header>

        <main class="main-content">
            <div class="input-section">
                <div class="input-card">
                    <input type="text" id="taskInput" class="task-input" placeholder="写下你今天做的事情...">
                    <button id="addBtn" class="add-btn">➕ 添加</button>
                </div>
            </div>

            <h2 class="section-title">📋 今日任务</h2>
            <div id="taskList" class="task-list">
                <div class="empty-state">
                    <span class="empty-emoji">🎉</span>
                    <p>还没有任务，先添加一个吧！</p>
                </div>
            </div>

            <div class="stats-section">
                <div class="stat-card">
                    <span class="stat-emoji">✅</span>
                    <div><p class="stat-label">已完成</p><p class="stat-number" id="completedCount">0</p></div>
                </div>
                <div class="stat-card">
                    <span class="stat-emoji">⏳</span>
                    <div><p class="stat-label">待进行</p><p class="stat-number" id="pendingCount">0</p></div>
                </div>
                <div class="stat-card">
                    <span class="stat-emoji">📊</span>
                    <div><p class="stat-label">总数</p><p class="stat-number" id="totalCount">0</p></div>
                </div>
            </div>
        </main>

        <footer class="footer">
            <p>✨ 每个用户的任务完全私密 ✨</p>
        </footer>
    </div>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
